<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Inscrição confirmada. Obrigado por se cadastrar na formação Lucrar com IA Pro.">
    <title>Inscrição Quase Concluída - Lucrar com IA Pro</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .thank-you-icon {
            font-size: 64px;
            color: #10a37f;
            margin-bottom: 24px;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <!-- Aurora background -->
    <div class="aurora-bg"></div>

    <!-- Background Dot Pattern (No Nodes) -->
    <div class="dotted-bg"></div>

    <!-- Main Floating Content -->
    <main class="content-overlay">
        <div class="elegant-container">
            <h1 class="headline">Inscrição <span class="highlight">Quase Concluída!</span></h1>
            <p class="subheadline" style="font-size: 18px; margin-bottom: 20px;">
                Falta apenas um último passo...
            </p>
            <p class="subheadline" style="color: #ddd; max-width: 550px;">
                Nós enviamos um link de confirmação para o e-mail que você cadastrou. Por favor, <strong>abra seu e-mail
                    e clique no link</strong> para confirmar sua inscrição na lista de espera da formação Lucrar com IA
                PRO.
            </p>

            <a href="index.html" class="submit-btn"
                style="text-decoration: none; width: auto; display: inline-flex; margin-top: 30px; background: transparent; border: 1px solid rgba(255,255,255,0.2); box-shadow: none;">
                <i class="fa-solid fa-arrow-left btn-icon"></i>
                <span class="btn-text">Voltar ao início</span>
            </a>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
