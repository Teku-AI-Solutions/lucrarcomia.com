<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Cadastre-se na formação Lucrar com IA Pro e aprenda a dominar o n8n.">
    <title>Lucrar com IA Pro</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- n8n Node Canvas -->
    <div class="canvas-wrapper">
        <!-- Aurora background -->
        <div class="aurora-bg"></div>
        <div class="n8n-canvas" id="canvas">
            <div id="nodes-container"></div>
        </div>
    </div>

    <!-- Main Floating Content -->
    <main class="content-overlay">
        <!-- Detached floating form container without the heavy card bg -->
        <div class="elegant-container">
            <h1 class="headline">Lucrar com IA <span class="highlight">PRO</span></h1>
            <p class="subheadline">Cadastre seu e-mail aqui para receber mais informações sobre a formação Lucrar com IA
                PRO que será lançada em breve.</p>

            <form id="subscription-form">
                <div class="input-wrapper name-field">
                    <input type="text" id="nome" placeholder="Digite seu nome completo..." required autocomplete="name">
                </div>
                <div class="input-wrapper" style="position: relative;">
                    <input type="email" id="email" placeholder="Digite seu melhor e-mail..." required
                        autocomplete="email">
                    <div id="email-suggestion" class="typo-suggestion"></div>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">Cadastrar e-mail</span>
                    <i class="fa-solid fa-arrow-right btn-icon"></i>
                </button>
            </form>

            <div class="form-footer">
                <i class="fa-solid fa-lock"></i> Seus dados estão 100% seguros
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
